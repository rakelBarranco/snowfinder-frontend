<section class="admin-hero">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">
      <div>
        <div class="label mb-3">Panel de Control</div>
        <h1 class="fw-light mb-0 admin-title">Gestión de Catálogo</h1>
      </div>
    </div>
  </div>
</section>

<!-- Pestañas -->
<div class="admin-tabs">
  <div class="container">
    <div class="d-flex">
      <button class="admin-tab" [class.admin-tab-active]="pestanaActiva === 'estaciones'"
              (click)="cambiarPestana('estaciones')">
        <i class="bi bi-geo-alt me-2"></i>Estaciones
      </button>
      <button class="admin-tab" [class.admin-tab-active]="pestanaActiva === 'opiniones'"
              (click)="cambiarPestana('opiniones')">
        <i class="bi bi-chat-dots me-2"></i>Opiniones
      </button>
    </div>
  </div>
</div>

<div class="container py-4 py-lg-5">
  @if (pestanaActiva === 'estaciones') {
    <app-admin-estaciones />
  } @else {
    <app-admin-opiniones />
  }
</div>
