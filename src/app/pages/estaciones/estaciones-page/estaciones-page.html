<div class="container mt-5">
  <h2 class="fw-bold mb-4">🏔️ Estaciones de esquí</h2>

  @if (loading) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Cargando estaciones...</p>
    </div>
  }

  <div class="row g-4">
    @for (estacion of estaciones; track estacion.id) {
      <div class="col-md-4">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body">
            <h5 class="card-title fw-bold">{{ estacion.nombre }}</h5>
            <span class="badge bg-secondary mb-2">{{ estacion.pais }}</span>
            <p class="card-text text-muted small">{{ estacion.descripcion }}</p>
            <p class="mb-0">
              <i class="bi bi-map text-primary"></i>
              <span class="text-primary fw-bold ms-1">{{ estacion.kmPistas }} km</span> de pistas
            </p>
            <p class="mb-0 mt-1">
              <i class="bi bi-arrow-up text-success"></i>
              <span class="text-success fw-bold ms-1">{{ estacion.altitud }} m</span> de altitud
            </p>
          </div>
          <div class="card-footer bg-white border-0">
            <button class="btn btn-outline-primary btn-sm w-100"
                    [routerLink]="['/estaciones', estacion.id]">
              Ver detalle
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
