<section class="favoritos-hero">
  <div class="container">
    <div class="label mb-3">Selección Personal</div>
    <h1 class="fw-light mb-0 favoritos-title">Mis Favoritos</h1>
  </div>
</section>

<div class="container py-4 py-lg-5">

  @if (loading) {
    <div class="text-center py-5">
      <div class="spinner-border admin-spinner" role="status"></div>
      <p class="mt-3 label">Cargando favoritos...</p>
    </div>
  }

  @if (!loading && estaciones.length === 0) {
    <div class="snow-card text-center py-5">
      <i class="bi bi-heart mb-3 favoritos-empty-icon"></i>
      <p class="label mb-4">No tienes estaciones guardadas todavía</p>
      <a routerLink="/estaciones" class="btn btn-snow-outline px-5 py-3">Ir al catálogo</a>
    </div>
  }

  <div class="row g-4">
    @for (estacion of estaciones; track estacion.id) {
      <div class="col-12 col-sm-6 col-lg-4">
        <app-estacion-card
          [estacion]="estacion"
          [mostrarEliminar]="true"
          (eliminar)="eliminarFavorito($event)" />
      </div>
    }
  </div>

</div>
