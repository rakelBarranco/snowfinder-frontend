<div class="auth-page d-flex align-items-center justify-content-center px-3">
  <div class="auth-container">

    <div class="text-center mb-5">
      <div class="auth-logo mb-2">SNOW<span class="auth-logo-accent">FINDER</span></div>
      <div class="label">Crea tu cuenta gratis</div>
    </div>

    @if (error) {
      <div class="auth-error mb-4">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
      </div>
    }

    <div class="mb-4">
      <div class="auth-label mb-2">Nombre</div>
      <input type="text" class="snow-input w-100"
             [class.input-error]="errores.nombre"
             [(ngModel)]="nombre"
             placeholder="Tu nombre" />
      @if (errores.nombre) {
        <div class="form-error-msg">{{ errores.nombre }}</div>
      }
    </div>

    <div class="mb-4">
      <div class="auth-label mb-2">Email</div>
      <input type="email" class="snow-input w-100"
             [class.input-error]="errores.email"
             [(ngModel)]="email"
             placeholder="tu@email.com" />
      @if (errores.email) {
        <div class="form-error-msg">{{ errores.email }}</div>
      }
    </div>

    <div class="mb-5">
      <div class="auth-label mb-2">Contraseña</div>
      <div class="position-relative">
        <input [type]="mostrarPassword ? 'text' : 'password'"
               class="snow-input w-100 pe-5"
               [class.input-error]="errores.password"
               [(ngModel)]="password"
               placeholder="••••••••" />
        <button class="auth-toggle-password" type="button"
                (click)="mostrarPassword = !mostrarPassword">
          <i class="bi" [class.bi-eye]="!mostrarPassword"
             [class.bi-eye-slash]="mostrarPassword"></i>
        </button>
      </div>
      @if (errores.password) {
        <div class="form-error-msg">{{ errores.password }}</div>
      }
    </div>

    <button class="btn btn-snow w-100 py-3 mb-4" (click)="register()" [disabled]="loading">
      @if (loading) {
        <span class="spinner-border spinner-border-sm me-2"></span>
      }
      Crear Cuenta
    </button>

    <p class="text-center mb-0 auth-footer-text">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="auth-footer-link">Inicia sesión aquí</a>
    </p>

  </div>
</div>
